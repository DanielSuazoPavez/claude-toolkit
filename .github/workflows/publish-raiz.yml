name: Publish Raiz Distribution

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.claude/agents/**'
      - '.claude/hooks/**'
      - '.claude/memories/**'
      - 'dist/**'
      - '.github/scripts/publish.py'
      - '.github/scripts/format-raiz-changelog.py'
      - '.github/workflows/publish-raiz.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build raiz distribution
        run: python .github/scripts/publish.py raiz dist-output/raiz

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: DanielSuazoRaiz/claude-toolkit-raiz
          ssh-key: ${{ secrets.RAIZ_DEPLOY_KEY }}
          path: target-repo

      - name: Read previous version from target
        id: prev
        run: |
          if [[ -f target-repo/.claude-toolkit-version ]]; then
            echo "version=$(cat target-repo/.claude-toolkit-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync distribution to target
        id: sync
        run: |
          # Clear existing .claude/ in target (full replace, not merge)
          rm -rf target-repo/.claude

          # Copy built distribution
          cp -r dist-output/raiz/.claude target-repo/.claude

          # Stamp toolkit version (same as `claude-toolkit sync` does)
          cp VERSION target-repo/.claude-toolkit-version

          # Check for changes
          cd target-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: update from claude-toolkit v$(cat .claude-toolkit-version) ($(date +%Y-%m-%d))"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Build Telegram message
        id: msg
        run: |
          VERSION=$(cat VERSION)
          PREV_VERSION="${{ steps.prev.outputs.version }}"

          FROM_FLAG=""
          if [[ -n "$PREV_VERSION" && "$PREV_VERSION" != "$VERSION" ]]; then
            FROM_FLAG="--from $PREV_VERSION"
          fi

          # Always call formatter — it produces a minimal message when no raiz changes exist
          MSG=$(python .github/scripts/format-raiz-changelog.py "$VERSION" $FROM_FLAG --html)

          # Write to file — avoids shell expansion issues in curl
          echo "$MSG" > /tmp/telegram-msg.html

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text@/tmp/telegram-msg.html \
            || echo "::warning::Telegram notification failed (non-fatal)"
