name: Publish Raiz Distribution

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.claude/agents/**'
      - '.claude/hooks/**'
      - '.claude/memories/**'
      - 'dist/**'
      - '.github/scripts/publish.py'
      - '.github/scripts/format-raiz-changelog.sh'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build raiz distribution
        run: python .github/scripts/publish.py raiz dist-output/raiz

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: DanielSuazoRaiz/claude-toolkit-raiz
          ssh-key: ${{ secrets.RAIZ_DEPLOY_KEY }}
          path: target-repo

      - name: Sync distribution to target
        id: sync
        run: |
          # Clear existing .claude/ in target (full replace, not merge)
          rm -rf target-repo/.claude

          # Copy built distribution
          cp -r dist-output/raiz/.claude target-repo/.claude

          # Stamp toolkit version (same as `claude-toolkit sync` does)
          cp VERSION target-repo/.claude-toolkit-version

          # Check for changes
          cd target-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: update from claude-toolkit v$(cat .claude-toolkit-version) ($(date +%Y-%m-%d))"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Build Telegram message
        if: steps.sync.outputs.pushed == 'true'
        id: msg
        run: |
          VERSION=$(cat VERSION)
          OVERRIDE="dist/raiz/changelog/${VERSION}.html"

          if [[ -f "$OVERRIDE" ]]; then
            MSG=$(cat "$OVERRIDE")
          else
            MSG=$(.github/scripts/format-raiz-changelog.sh "$VERSION" --html)
          fi

          if [[ -z "$MSG" ]]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Write to file — avoids shell expansion issues in curl
          echo "$MSG" > /tmp/telegram-msg.html
          echo "empty=false" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: steps.sync.outputs.pushed == 'true' && steps.msg.outputs.empty != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text@/tmp/telegram-msg.html \
            || echo "::warning::Telegram notification failed (non-fatal)"
